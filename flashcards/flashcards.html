<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flashcards Index</title>
  <!-- 引用 CSS -->
  <link rel="stylesheet" href="flashcards.css">
</head>
<body>
  <h1 style="text-align:center; margin-bottom:20px;">Flashcards Index</h1>

  <!-- 闪卡索引按钮 -->
  <div style="text-align:center; margin-bottom:30px;">
    <button onclick="loadSet('chemistry')">Chemistry</button>
    <button onclick="loadSet('physics')">Physics</button>
    <button onclick="loadSet('math')">Math</button>
  </div>

  <!-- 单张卡片显示区 -->
  <div class="flashcard-single" id="flashcard">
    <div class="card-inner" id="card-inner">
      <div class="card-front" id="card-front">Select a set</div>
      <div class="card-back" id="card-back"></div>
    </div>
  </div>

  <!-- 按钮控制 -->
  <div style="text-align:center; margin-top:20px;">
    <button id="flip" style="padding:10px 20px; margin-right:10px;">Flip</button>
    <button id="next" style="padding:10px 20px;">Next</button>
  </div>

  <!-- 返回主页按钮 -->
  <div style="text-align:center; margin-top:30px;">
    <a href="../index.html" style="padding:10px 20px; background-color:#4CAF50; color:white; border-radius:5px; text-decoration:none;">Back to Home</a>
  </div>

  <!-- 引用新版 JS -->
  <script src="flashcards-single.js"></script>
</body>
</html>
