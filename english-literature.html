<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>English Literature</title>

  <style>
    body {
      font-family: Arial;
      color: #000;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      min-height: 100vh;
      margin: 0;
      text-align: center;
    }

    h1 {
      margin-bottom: 30px;
    }

    h2 {
      margin-bottom: 15px;
      margin-top: 40px;
    }

    .card-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      width: 100%;
      max-width: 900px;
    }

    .card {
      background: #f9fafb;
      padding: 18px;
      border-radius: 14px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: 0.2s;
    }

    .card:hover {
      transform: translateY(-5px);
      border: 1px solid #A4D65E;
    }

    .tag {
      font-size: 12px;
      background: #eef8e6;
      padding: 3px 8px;
      border-radius: 6px;
      margin-bottom: 12px;
      display: inline-block;
    }

    .button {
      margin-top: 12px;
      padding: 8px 0;
      width: 22%; /* 长条按钮 */
      border-radius: 8px;
      background: #A4D65E;
      font-size: 14px;
      font-weight: bold;
    }

    a.back-btn {
      margin-top: 30px;
      text-decoration: none;
      color: #000;
      font-size: 14px;
    }
  </style>
</head>

<body>

<h1>English Literature</h1>

  </div>
  <div class="card">

    <h3>An Inspector Calls</h3>
    <a href="flashcards-inspector-calls.html" class="button">Open</a>
  </div>
</div>

    <h3>Poetry Anthology</h3>

<a href="index.html" class="back-btn">← Back to Home</a>

</body>
</html>
