<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>English Literature</title>

  <style>
    body {
      font-family: Arial;
      color: #000;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      min-height: 100vh;
      margin: 0;
      text-align: center;
    }

    h1 {
      margin-bottom: 40px;
      font-size: 32px;
    }

    h2 {
      margin-bottom: 15px;
      margin-top: 40px;
      font-size: 24px;
    }

    .card-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      width: 100%;
      max-width: 900px;
    }

    .card {
      background: #f9fafb;
      padding: 18px;
      border-radius: 14px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      min-height: 150px;
      transition: transform 0.2s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card h3 {
      margin: 0;
      font-size: 18px;
      text-align: center;
    }

    .button {
      margin-top: 10px;
      padding: 6px 0;
      width: 40%; /* 初始按钮宽度 */
      border-radius: 8px;
      background: #A4D65E;
      font-size: 14px;
      font-weight: bold;
      transition: all 0.2s;
      text-align: center;
    }

    .card:hover .button {
      width: 100%;      /* hover 时占满卡片宽度 */
      padding: 25px 0;  /* 高度约占卡片的1/5~1/6 */
    }

    a.back-btn {
      margin-top: 40px;
      text-decoration: none;
      color: #000;
      font-size: 14px;
    }
  </style>
</head>

<body>

<h1>English Literature</h1>

<!-- Paper 1 -->
<h2>Paper 1</h2>
<div class="card-container">
  <div class="card">
    <h3>Merchant of Venice</h3>
    <a href="flashcards-merchant-venice.html" class="button">Open</a>
  </div>
  <div class="card">
    <h3>An Inspector Calls</h3>
    <a href="flashcards-inspector-calls.html" class="button">Open</a>
  </div>
</div>

<!-- Paper 2 -->
<h2>Paper 2</h2>
<div class="card-container">
  <div class="card">
    <h3>Poetry Anthology</h3>
    <a href="PA/PoetryAnthology-menu.html" class="button">Open</a>
  </div>
  <div class="card">
    <h3>Pride and Prejudice</h3>
    <a href="flashcards-pride-prejudice.html" class="button">Open</a>
  </div>
</div>

<a href="index.html" class="back-btn">← Back to Home</a>

</body>
</html>
