<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Geography | Help me 3758</title>

  <style>
    /* ===== 基础 ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
      background: #ffffff;
      color: #1e293b;
      padding: 2rem 1.5rem;
      line-height: 1.4;
    }

    /* ===== Section ===== */
    .section {
      max-width: 1280px;
      margin: 0 auto 2.5rem auto;
    }

    /* ===== 主标题 ===== */
    .hero {
      margin-bottom: 2rem;
      border-bottom: 2px solid #eef2f6;
      padding-bottom: 1rem;
    }

    .hero h1 {
      font-size: 2.5rem;
      color: #A4D65E;
      font-weight: 800;
      margin-bottom: 0.25rem;
    }

    /* ⭐ 去掉绿色竖条的小标题 */
    .hero p {
      font-size: 1.1rem;
      color: #475569;
    }

    /* ===== Mindmap ===== */
    .iframe-container {
      position: relative;
      width: 100%;
      padding-top: 56.25%;
      border-radius: 1rem;
      overflow: hidden;
      border: 1px solid #e9edf2;
    }

    .iframe-container iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

  </style>
</head>
