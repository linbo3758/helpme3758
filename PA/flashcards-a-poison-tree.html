<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Flashcards</title>

  <style>
    /* 全局风格统一 */
    body {
      font-family: Arial, sans-serif;
      color: #000;
      background-color: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      min-height: 100vh;
      margin: 0;
      text-align: center;
    }

    h1 {
      margin-bottom: 25px;
    }

    a.back-btn {
      margin-top: 15px;
      text-decoration: none;
      color: #000;
      font-size: 13px;
    }

    /* 卡片容器 */
    .card-container {
      perspective: 1000px;
      width: 100%;
      display: flex;
      justify-content: center;
      margin-bottom: 25px;
    }

    /* 卡片本体 */
    .card {
      width: 620px;
      max-width: 90%;
      min-height: 300px;
      padding: 30px;
      background: #f9fafb; /* 统一卡片背景 */
      border-radius: 14px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05); /* 统一轻阴影 */
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.6s;
      transform-style: preserve-3d;
      position: relative;
      line-height: 1.7;
      letter-spacing: 0.6px;
      white-space: pre-wrap;
      word-break: break-word;
      text-align: center;
    }

    .card.flip {
      transform: rotateY(180deg);
    }

    .card-face {
      position: absolute;
      backface-visibility: hidden;
      width: 100%;
    }

    .back {
      transform: rotateY(180deg);
    }

    /* 统一按钮风格 */
    .next-btn {
      margin-top: 25px;
      padding: 14px 35px;
      background-color: #A4D65E; /* 首页点缀绿色 */
      border: none;
      border-radius: 10px;
      font-size: 14px;
      text-transform: uppercase;
      cursor: pointer;
      color: #000; /* 黑字 */
      font-weight: bold;
      transition: background-color 0.2s;
    }

    .next-btn:hover {
      background-color: #8ec34b; /* hover更深绿 */
    }


  </style>
</head>

<body>

  <h1>Poison Tree Flashcards</h1>

  <div class="card-container">
    <div class="card" onclick="flipCard()">
      <div class="card-face front" id="question"></div>
      <div class="card-face back" id="answer"></div>
    </div>
  </div>

  <button class="next-btn" onclick="nextCard()">Next</button>

  <a class="back-btn" href="/helpme3758/">← Back to Home</a>

  <script>
    const flashcards = [

      {
        question: "Four themes in Poison Tree",
        answer: "• Conflict in society\n• Effect of conflict\n• Nature\n• Anger"
      },

      {
        question: "Conflict in Society",
        answer: "• Between individuals\n• Readers cannot find what the conflict is → UNIVERSAL\n• Can be applied to anyone"
      },

      {
        question: "Nature",
        answer: "• Metaphor\n• Apple of sin in the Bible\n• Contrast to positive themes usually linked to nature"
      },

      {
        question: "Anger",
        answer: "• Unchecked → harmful\n• Dealt with → resolved\n• Symbolised by natural elements\n• Anger is a natural emotion"
      },

      {
        question: "“I was angry with my friend;\nI told my wrath, my wrath did end.\nI was angry with my foe:\nI told it not, my wrath did grow.”",
        answer: "• Anaphora: repetition of “I was angry” emphasises anger as key theme\n• Contrast: shows different outcomes depending on how anger is handled"
      },

      {
        question: "Effect of conflict",
        answer: "• Communication → resolution\n• Suggests society should express negative emotions\n• Otherwise emotions become toxic"
      },

      {
        question: "“And it grew both day and night.\nTill it bore an apple bright.”",
        answer: "• Contrast: active “it grew” vs passive “I water’d” → loss of control\n• Growth shows anger developing continuously\n• Apple symbolises conflict + forbidden fruit (Genesis)"
      },

      {
        question: "“In the morning glad I see;\nMy foe outstretched beneath the tree.”",
        answer: "• “Glad” creates a sinister tone\n• Contrast: positive word in a dark situation\n• Shows corruption caused by suppressed anger\n• Moral: anger may feel satisfying but is ultimately destructive"
      },
  
      {
        question: "Form",
        answer: "• The poem consists of four quatrains and entirely rhyming couplets.\n•Regular form speeds up the pace of the poem, echo how fast bad feelings can develop quickly.\n•Nursery rhyme contrasts with the dark and deep moral message."
      },
      
      {
  question: "Structure",
  answer: "• Tension builds up throughout the poem.\n• First stanza – overview\n• Following stanza – develop extended metaphor\n• Final stanza – climax. Implied speaker's building anger led the foe's death\n• Ends with climax, leave thinking space to readers."
},
      
{
  question: "Language",
  answer: "• Metaphor: Simplifies complex ideas, make anger this abstract idea to every item (transfers unfamiliar to familiar).\n• Increase vividness and make the poem memorable and persuasive.\n• Repetition – Anaphora\n• Tell the story quickly – tension\n• Constant growth of anger (never ends)"
},
      
{
  question: "Moral message",
  answer: "• Repression of anger can be damage to yourself and others.\n• Negative feeling is a natural emotion, be honest to yourself about them. Speak them out."
},
      
{
  question: "Context Blake's era",
  answer: "• Blake was an early Romantic poet and artist.\n• Romantics valued strong emotion and imagination.\n• They often challenged social institution and celebrate personal freedom."
},
      
{
  question: "Context William Blake",
  answer: "• Blake was a religious man, which shown in his poems, he frequently used Biblical imagery.\n• Blake opposed social and emotional repression in society, reflects criticism that suppress natural feelings.\n• This poem comes from Songs of Experience explored the darker sides of human emotion and society."
}

    ];

    let currentIndex = 0;

    function updateCard() {
      document.getElementById("question").innerText = flashcards[currentIndex].question;
      document.getElementById("answer").innerText = flashcards[currentIndex].answer;
      document.querySelector(".card").classList.remove("flip");
    }

    function flipCard() {
      document.querySelector(".card").classList.toggle("flip");
    }

    function nextCard() {
      currentIndex = (currentIndex + 1) % flashcards.length;
      updateCard();
    }

    updateCard();
  </script>

</body>
</html>
